<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butterworth Pub</title>
    <style>
        body {
            /* Cobalt blue background */
            background-color: #002D04;
            /*#0047AB; */
           
           
            
            /* Lighter blue text */
            color: #000000
                /*#0B192C*/
            /*#87CEEB;*/
            
            /* Removes default browser margins */
            margin: 0; 
            
            /* Makes the body take up the full height of the screen */
            height: 100vh; 
            
            /* Flexbox to perfectly center the image horizontally and vertically */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .center-image {
            /* Navy blue outline (8 pixels thick, solid line) */
            border: 8px solid #000000; 
            
            /* Prevents the image from being wider than 80% of the screen */
            max-width: 80%; 
            
            /* Prevents the image from being taller than 80% of the screen height */
            max-height: 80vh; 
        }
    </style>
</head>
<body>

    <img src="bpub.png" alt="Butterworth Pub Landscape" class="center-image">

</body>
</html>
